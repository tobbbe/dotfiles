# NOTE: reload config (not all work) with c-s-f5
# NOTE: changing icon: drag the icon to small icon in kitty app upper left corner (in right click > "Get info"), then run `rm /var/folders/*/*/*/com.apple.dock.iconcache; killall Dock`
#
# include theme first so we can override it
# theme Catppuccin-Mocha
include current-theme.conf

# font_family "SFMono Nerd Font"
# font_family      family="IBM Plex Mono"
# font_family      family="Fragment Mono"
font_family      family="0xProto NL"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 17

# modify_font cell_height 6px

# if not working, check so that theme is not overriding (ex current-theme.conf)
macos_titlebar_color background
window_title_template {session_name}
hide_window_decorations titlebar-only

# top, right, bottom, left
window_padding_width 0 6.0 0 6.0
window_margin_width 0 0 0
single_window_margin_width 0 0 0

placement_strategy top
# set to 0 if showing title bar
tab_bar_margin_height 6.0 0
tab_bar_margin_width 10.0

# background_opacity 0.73
# background_blur 2
start_as_hidden no
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor no-title
confirm_os_window_close 0

# Enable remote control for nvim integration
allow_remote_control yes
listen_on unix:/tmp/kitty-socket

cursor_trail 3
cursor_trail_decay 0.1 0.3
cursor_trail_start_threshold 2

tab_bar_filter session:~ or session:^$
tab_bar_edge                top
tab_bar_align center
tab_bar_style               separator
# tab_separator " | "
tab_separator " "
tab_powerline_style         slanted
tab_title_template          {session_name if index == 1 and session_name else (title if title else tab.active_exe.lstrip('-'))}{'({})'.format(num_windows) if num_windows > 2 else ''}
tab_bar_min_tabs 1
# tab_bar_style hidden

# override if min tabs 2
# tab_bar_min_tabs 2
# single_window_margin_width 8.0 0 0

# keymaps
macos_option_as_alt left

# 🚨 ctrl+shift is intercepted by default by Kitty (kitty_mod). Override specific here

map ctrl+c copy_or_noop
map ctrl+v cmd+v

# c-s-f to search everywhere in nvim
map ctrl+shift+f send_text all \x1b[102;6u

# Code mode remaps (controlled by Karabiner F3 toggle)
map å send_text all [
map Å send_text all {
map f13 send_text all ]
map f19 send_text all }

# shift enter for newline in claude etc
# map shift+enter send_text all \x1b\r
# USE THIS INSTEAD. Works in all terminals without configuration:
# 1. Backslash + Enter (\ + Enter) - Quick escape method
# 2. Ctrl+J - Control sequence for line feed
# 3. Option+Enter - Default on macOS

# enable Shift+Enter detection via Kitty keyboard protocol
map shift+enter send_text all \x1b[13;2u
# send ctrl+tab to apps (e.g. nvim)
# map ctrl+tab send_text all \x1b[9;5u

# fix ctrl+v paste
# map super+v send_text all \x16
# map ctrl+v paste_from_clipboard
# map ctrl+c copy_to_clipboard

# shift+alt+HJKL for tmux pane creation
# map shift+alt+h send_text all \x1bH
# map shift+alt+j send_text all \x1bJ
# map shift+alt+k send_text all \x1bK
# map shift+alt+l send_text all \x1bL

# session management
startup_session ~/.config/kitty/sessions/dotfiles.kitty-session

map kitty_mod+enter no_op
# map ctrl+t new_tab_with_cwd
map ctrl+enter new_window_with_cwd
map ctrl+t launch --allow-remote-control --type=background /usr/bin/python3 /Users/tobbe/.config/kitty/smart_tab_nav.py t
# map ctrl+tab previous_tab

# windows and stacking
enabled_layouts stack,vertical,horizontal
map ctrl+shift+z next_layout
map cmd+b>cmd+b>s goto_layout vertical
map cmd+b>cmd+b>v goto_layout horizontal
map cmd+b>cmd+b>a goto_layout stack
map ctrl+cmd+alt+j neighboring_window down
map ctrl+cmd+alt+k neighboring_window up
map ctrl+cmd+alt+h neighboring_window left
map ctrl+cmd+alt+l neighboring_window right

map ctrl+tab no_op

# karabiner remaps c-s-p to f7
map cmd+b>l goto_session ~/.config/kitty/sessions/livity-app.kitty-session
map cmd+b>w>l goto_session ~/.config/kitty/sessions/livityapp-web.kitty-session
map cmd+b>a goto_session ~/.config/kitty/sessions/arcane.kitty-session
map cmd+b>p goto_session ~/.config/kitty/sessions/peach.kitty-session
map cmd+b>w>i goto_session ~/.config/kitty/sessions/incline-web.kitty-session
map cmd+b>i>a goto_session ~/.config/kitty/sessions/incline-app.kitty-session
map cmd+b>e>l goto_session ~/.config/kitty/sessions/lellas.kitty-session
map cmd+b>t goto_session ~/.config/kitty/sessions/tmux.kitty-session
map cmd+b>d goto_session ~/.config/kitty/sessions/dotfiles.kitty-session
map cmd+b>c goto_session ~/.config/kitty/sessions/nvim.kitty-session
map cmd+b>n goto_session ~/.config/kitty/sessions/notes.kitty-session
map cmd+b>s goto_session ~/.config/kitty/sessions/scratch.kitty-session
map ctrl+2 goto_session ~/.config/kitty/sessions/build-scripts.kitty-session

# used for c-1 mapping in karabiner
map ctrl+shift+i goto_session -1

# tab navigation
# map ctrl+shift+g select_tab
# map cmd+b>x close_tab
# map cmd+b>c new_tab_with_cwd

# unified kitty and tmux nav
# map ctrl+shift+left launch --allow-remote-control --type=background /usr/bin/python3 /Users/tobbe/.config/kitty/smart_tab_nav.py h
# map ctrl+shift+right launch --allow-remote-control --type=background /usr/bin/python3 /Users/tobbe/.config/kitty/smart_tab_nav.py l

# not unified
map ctrl+shift+super+l launch --type=background tmux next-window
map ctrl+shift+super+h launch --type=background tmux previous-window

# map cmd+k next_tab
# map cmd+j previous_tab

# Dim text in inactive windows
# inactive_text_alpha 0.2

# Optional: also dim the background
# dim_opacity 0.2

scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'set nomodified readonly nolist' +'luafile ~/.config/nvim/lua/config/scrollback.lua' +'TermHl' +'$' -
map cmd+b>/ show_scrollback
