# Setup:
# 1. Run `kitten quick-access-terminal`
# 2. System Preferences->Keyboard->Keyboard Shortcuts->Services->General and set a shortcut for the Quick access to kitty entry.

kitty_override startup_session ~/.config/kitty/sessions/scratch.kitty-session

kitty_override background_opacity 0.73
kitty_override background_blur 8

