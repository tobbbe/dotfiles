# colors: https://i.stack.imgur.com/e63et.png
# reload live config with: `reload` and then `tmux source-file ~/.tmux.conf`. 🚨 You have to run them separately.

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g focus-events on
set -ag update-environment "KITTY_LISTEN_ON"
set -g status on

set -s extended-keys always # allows tmux to pass through modifier key combinations instead of stripping them
set -s extended-keys-format csi-u

# set -as terminal-features 'xterm*:extkeys' # tells tmux that terminal supports extended keys

# Set prefix to Ctrl+s (🚨 DONT USE "a" or "e", will break cmd+left/right)
# unbind C-q
set -g prefix C-s
bind C-s send-prefix

